name: Install vcpkg Dependencies

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: supercomputech/setup-cmake@v1
        with:
          cmake-version: '3.31.10'

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git D:\vcpkg
          cd D:\vcpkg
          .\bootstrap-vcpkg.bat

      - name: Run vcpkg install (manifest or explicit)
        shell: pwsh
        run: |
          cd D:\vcpkg
          .\vcpkg.exe --version
