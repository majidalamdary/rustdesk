name: Build RustDesk Windows x64 Custom (Hardcoded Server)

on:
  workflow_dispatch:  # برای اجرای دستی

permissions:
  contents: read

env:
  DEFAULT_RENDEZVOUS_SERVER: "your-server-ip-or-domain:21116"  # fallback اگر secret نباشد (تغییر دهید)
  DEFAULT_RS_PUB_KEY: "your_public_key_here_if_no_secret"     # fallback

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop for Flutter
        run: |
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies (vcpkg manifest mode)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_PREFER_NINJA: "OFF"  # جلوگیری از مشکل ninja -v در aom
        run: |
          run: & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows --clean-after-build
          # اگر همچنان مشکل aom داشت، --triplet x64-windows را تست کنید (dynamic)

      - name: Download Sciter DLL (برای GUI ویندوزی)
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll -OutFile target\release\sciter.dll

      - name: Hardcode custom server IP & public key
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          if (-not $env:RENDEZVOUS_SERVER) { $env:RENDEZVOUS_SERVER = $env:DEFAULT_RENDEZVOUS_SERVER }
          if (-not $env:RS_PUB_KEY) { $env:RS_PUB_KEY = $env:DEFAULT_RS_PUB_KEY }
          $files = Get-ChildItem -Recurse -File -Path libs -Filter config.rs
          if ($files.Count -eq 0) { Write-Error "config.rs پیدا نشد!"; exit 1 }
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            $content = $content -replace 'pub const RENDEZVOUS_SERVERS: \&\[&str\] = \&\["[^"]+"\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[\"$env:RENDEZVOUS_SERVER\"];"
            $content = $content -replace 'pub const RS_PUB_KEY: \&str = "[^"]+";', "pub const RS_PUB_KEY: &str = \"$env:RS_PUB_KEY\";"
            Set-Content $file.FullName $content -Encoding UTF8
          }
          Write-Output "Server hardcoded: $env:RENDEZVOUS_SERVER"

      - name: Build release binary
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-windows-x64
          path: |
            target\x86_64-pc-windows-msvc\release\rustdesk.exe
            target\release\sciter.dll
          retention-days: 7
