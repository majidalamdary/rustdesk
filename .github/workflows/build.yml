name: Build RustDesk Windows x64 Custom

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_RENDEZVOUS_SERVER: "your-server-ip-or-domain:21116"  # تغییر دهید یا از secrets استفاده کنید
  DEFAULT_RS_PUB_KEY: "your_public_key_here"                  # تغییر دهید

jobs:
  build-windows-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: |
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies via manifest (vcpkg.json)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows-static
          # اگر نیاز به feature خاصی بود: --x-feature=some-feature
          # اما برای RustDesk معمولاً بدون گزینه کافی است

      - name: Download Sciter DLL
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll -OutFile target\release\sciter.dll

      - name: Inject custom server & key from secrets
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          if (-not $env:RENDEZVOUS_SERVER) { $env:RENDEZVOUS_SERVER = "$env:DEFAULT_RENDEZVOUS_SERVER" }
          if (-not $env:RS_PUB_KEY) { $env:RS_PUB_KEY = "$env:DEFAULT_RS_PUB_KEY" }
          Get-ChildItem -Recurse -File -Path libs -Filter config.rs | ForEach-Object {
            (Get-Content $_.FullName) -replace 'pub const RENDEZVOUS_SERVERS: \&\[&str\] = \&\["[^"]+"\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[\"$env:RENDEZVOUS_SERVER\"];" `
                                     -replace 'pub const RS_PUB_KEY: \&str = "[^"]+";', "pub const RS_PUB_KEY: &str = \"$env:RS_PUB_KEY\";" | Set-Content $_.FullName -Encoding UTF8
          }

      - name: Build release
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-custom
          path: |
            target\x86_64-pc-windows-msvc\release\rustdesk.exe
            target\release\sciter.dll
