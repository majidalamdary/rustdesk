name: Build RustDesk Windows Custom (Hardcoded Server)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_RENDEZVOUS_SERVER: "your-server-ip-or-domain:21116"  # change or rely on secret
  DEFAULT_RS_PUB_KEY: "your-public-key-string-here"           # change or rely on secret

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: |
          flutter config --enable-windows-desktop
          flutter doctor -v
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Override NASM to 2.16.03 (fix aom multipass & ninja test)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          # Clean any existing NASM download
          Remove-Item -Path "$env:VCPKG_ROOT\downloads\tools\nasm" -Recurse -Force -ErrorAction SilentlyContinue
          # Download compatible NASM 2.16.03
          Invoke-WebRequest -Uri "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip" -OutFile nasm.zip
          Expand-Archive -Path nasm.zip -DestinationPath "$env:VCPKG_ROOT\downloads\tools\nasm"
          # Place nasm.exe where vcpkg expects it (in a subdir like nasm-2.16.03, but flatten if needed)
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_ROOT\downloads\tools\nasm\nasm-2.16.03" | Out-Null
          Move-Item -Path "$env:VCPKG_ROOT\downloads\tools\nasm\nasm.exe" -Destination "$env:VCPKG_ROOT\downloads\tools\nasm\nasm-2.16.03\nasm.exe" -Force
          # Optional: Also place ndisasm etc. if present in zip, but nasm.exe is main
          Write-Output "NASM overridden to 2.16.03"

      - name: Install dependencies (keep x64-windows or try static again)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows --clean-after-build
          # If you want to retry static after NASM fix: change to --triplet x64-windows-static
      - name: Install dependencies (dynamic to fix aom/NASM error)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows --clean-after-build

      - name: Download Sciter DLL
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll -OutFile target\release\sciter.dll

      - name: Hardcode server and key
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          if (-not $env:RENDEZVOUS_SERVER) { $env:RENDEZVOUS_SERVER = $env:DEFAULT_RENDEZVOUS_SERVER }
          if (-not $env:RS_PUB_KEY) { $env:RS_PUB_KEY = $env:DEFAULT_RS_PUB_KEY }
          Get-ChildItem -Recurse -Path libs -Filter config.rs | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace 'pub const RENDEZVOUS_SERVERS: \&\[&str\] = \&\["[^"]+"\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[\"$env:RENDEZVOUS_SERVER\"];"
            $content = $content -replace 'pub const RS_PUB_KEY: \&str = "[^"]+";', "pub const RS_PUB_KEY: &str = \"$env:RS_PUB_KEY\";"
            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Build release
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-windows
          path: |
            target\x86_64-pc-windows-msvc\release\rustdesk.exe
            target\release\sciter.dll
