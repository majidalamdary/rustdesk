name: Build Custom RustDesk (No Relay + vcpkg static)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg dependencies
        uses: actions/cache@v3  # تغییر از v2 به v3
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/buildtrees
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install Ninja (latest)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/ninja-build/ninja/releases/download/v1.11.0/ninja-win.zip -OutFile ninja.zip
          Expand-Archive ninja.zip -DestinationPath $env:USERPROFILE\bin
          $env:PATH += ";$env:USERPROFILE\bin"

      - name: Install CMake (latest)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/Kitware/CMake/releases/download/v3.31.10/cmake-3.31.10-windows-x86_64.zip -OutFile cmake.zip
          Expand-Archive cmake.zip -DestinationPath $env:USERPROFILE\bin
          $env:PATH += ";$env:USERPROFILE\bin"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg (manifest + static)
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_FEATURE_FLAGS=manifests" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_DEFAULT_TRIPLET=x64-windows-static" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Debug step to check for opus headers
      - name: Debug opus headers
        shell: pwsh
        run: |
          Write-Host "=== Checking for opus_multistream.h in vcpkg directories ==="
          dir "$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\include" -Recurse -Filter "opus_multistream.h" -ErrorAction SilentlyContinue
          Write-Host "=== Checking if opus folder exists in static triplet ==="
          if (Test-Path "$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\include\opus") {
            dir "$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\include\opus" | Select-Object Name
          } else {
            Write-Host "NO opus include dir in static triplet!"
          }
          Write-Host "=== Checking in host triplet ==="
          dir "$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows\include" -Recurse -Filter "opus_multistream.h" -ErrorAction SilentlyContinue

      - name: Install deps via vcpkg (manifest)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install

      # Apply patches for server configuration
      - name: Patch Server Settings (hardcode hbbs, empty relay)
        shell: pwsh
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          $files = Get-ChildItem -Recurse -File -Path libs -Filter config.rs
          foreach ($f in $files) {
            $c = Get-Content $f.FullName -Raw
            $c = $c -replace '(?m)^\s*pub\s+const\s+DEFAULT_RENDEZVOUS_SERVER\s*:\s*&str\s*=\s*".*?";\s*$', "pub const DEFAULT_RENDEZVOUS_SERVER: &str = `"$env:RENDEZVOUS_SERVER`";"
            $c = $c -replace '(?m)^\s*pub\s+const\s+DEFAULT_RELAY_SERVER\s*:\s*&str\s*=\s*".*?";\s*$', "pub const DEFAULT_RELAY_SERVER: &str = `"`";"
            $c = $c -replace '(?m)^\s*pub\s+const\s+DEFAULT_RS_PUB_KEY\s*:\s*&str\s*=\s*".*?";\s*$', "pub const DEFAULT_RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`";"
            Set-Content -Path $f.FullName -Value $c -Encoding UTF8
          }

      # Build RustDesk
      - name: Build RustDesk
        shell: pwsh
        env:
          C_INCLUDE_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows\include;${{ github.workspace }}\vcpkg\installed\x64-windows-static\include
          CPLUS_INCLUDE_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows\include;${{ github.workspace }}\vcpkg\installed\x64-windows-static\include
        run: cargo build --release

      # Upload EXE
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-no-relay
          path: target\release\rustdesk.exe
