name: Build RustDesk Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --------------------------------
      # Flutter (نسخه صحیح برای RustDesk)
      # --------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # --------------------------------
      # Resolve dependencies
      # --------------------------------
      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      # --------------------------------
      # Generate bridge (خیلی مهم)
      # --------------------------------
      - name: Generate Rust bridge
        working-directory: flutter
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs

      # --------------------------------
      # Verify generated file
      # --------------------------------
      - name: Check generated_bridge.dart
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE\flutter\lib\generated_bridge.dart") {
            Write-Host "Bridge generated successfully"
          } else {
            Write-Host "ERROR: generated_bridge.dart missing"
            exit 1
          }

      # --------------------------------
      # Enable Windows desktop
      # --------------------------------
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      # --------------------------------
      # Build Windows Release
      # --------------------------------
      - name: Build Windows EXE
        working-directory: flutter
        run: flutter build windows --release

      # --------------------------------
      # Upload output
      # --------------------------------
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-build
          path: flutter/build/windows/x64/runner/Release/**
