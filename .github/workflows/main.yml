name: Build RustDesk Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------------------------
      # Install Rust
      # ---------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ---------------------------
      # Setup Flutter
      # ---------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # ---------------------------
      # Rust build (GENERATES BRIDGE)
      # ---------------------------
      - name: Cargo build (generate bridge)
        run: cargo build --release

      # ---------------------------
      # Flutter pub get
      # ---------------------------
      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      # ---------------------------
      # Verify bridge
      # ---------------------------
      - name: Check generated_bridge.dart
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE\flutter\lib\generated_bridge.dart") {
            Write-Host "Bridge generated successfully"
          } else {
            Write-Host "ERROR: generated_bridge.dart missing"
            exit 1
          }

      # ---------------------------
      # Enable Windows
      # ---------------------------
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      # ---------------------------
      # Build Windows
      # ---------------------------
      - name: Build Windows EXE
        working-directory: flutter
        run: flutter build windows --release

      # ---------------------------
      # Upload artifact
      # ---------------------------
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: flutter/build/windows/x64/runner/Release/**
