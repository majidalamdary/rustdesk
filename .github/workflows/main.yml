name: Install vcpkg Dependencies

on:
  push:
    branches:
      - main  # یا هر شاخه‌ای که مدنظر دارید

jobs:
  build:
    runs-on: windows-latest  # برای اجرای روی ویندوز (می‌توانید از ubuntu-latest هم استفاده کنید)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up CMake
      uses: supercomputech/setup-cmake@v1
      with:
        cmake-version: '3.31.10'  # ورژن CMake که نیاز دارید

    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git D:/vcpkg  # کپی vcpkg از گیت‌هاب
        cd D:/vcpkg
        ./vcpkg install  # اجرای دستور برای نصب وابستگی‌ها

    - name: Build project
      run: |
        cd D:/vcpkg
        ./vcpkg install
